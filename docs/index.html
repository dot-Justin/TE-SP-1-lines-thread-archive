<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TE SP-1 · Lines Archive</title>
<style>
/* ── Reset ── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
img{max-width:100%;height:auto;display:block}

/* ── Fonts ── */
:root{--sans:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;--mono:'SF Mono','Cascadia Code','JetBrains Mono','Fira Code','Consolas',monospace;--orange:#FF6B00;--bg:#000;--fg:#e8e8e8;--muted:#555;--card:#0d0d0d;--border:#1a1a1a;--accent:#FF6B00}

/* ── Base ── */
html{font-size:15px;scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--fg);min-height:100vh;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
::selection{background:var(--orange);color:#000}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#000}
::-webkit-scrollbar-thumb{background:#222;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#333}
a{color:var(--orange);text-decoration:none}
a:hover{text-decoration:underline}

/* ── Layout ── */
.container{max-width:680px;margin:0 auto;padding:3rem 1.5rem 6rem}
@media(max-width:600px){.container{padding:1.5rem 1rem 4rem}}

/* ── Header ── */
.header{margin-bottom:2.5rem}
.header h1{font-size:1.1rem;font-weight:400;letter-spacing:.02em;text-transform:uppercase;color:var(--muted);margin-bottom:.35rem}
.header h1 em{font-style:normal;font-weight:700;color:var(--fg)}
.header .sub{font-size:.82rem;color:var(--muted);line-height:1.5}
.header .sub a{color:var(--orange);text-decoration:underline 1px dotted transparent;text-underline-offset:3px}
.header .sub a:hover{text-decoration-color:var(--orange)}
.header .tag{display:inline-block;margin-top:.6rem;padding:.2rem .55rem;border:1px solid var(--border);border-radius:2px;font-size:.7rem;color:var(--muted);font-family:var(--mono);letter-spacing:.04em}
.header .tag span{color:var(--fg)}

/* ── Stats ── */
.stats{display:flex;flex-wrap:wrap;gap:0;margin-bottom:2rem;border:1px solid var(--border);padding:0}
.stat{flex:1;min-width:80px;padding:.55rem .6rem;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.stat:nth-child(3n){border-right:none}
.stat:last-child{border-right:none}
.stat .num{font-family:var(--mono);font-size:.85rem;font-weight:600;color:var(--orange);letter-spacing:-.01em}
.stat .lbl{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:.12rem}
@media(max-width:400px){.stat{min-width:70px;padding:.45rem .5rem}.stat:nth-child(2n){border-right:none}}

/* ── Search ── */
.search-wrap{margin-bottom:1.2rem}
.search-wrap input{width:100%;padding:.55rem .7rem;background:var(--card);border:1px solid var(--border);border-radius:2px;color:var(--fg);font-family:var(--mono);font-size:.78rem;outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--orange)}
.search-wrap input::placeholder{color:#333}

/* ── Pagination ── */
.pages{display:flex;align-items:center;gap:.35rem;flex-wrap:wrap;margin-bottom:1rem}
.pages a,.pages span{padding:.25rem .55rem;font-size:.7rem;font-family:var(--mono);color:var(--muted);border:1px solid transparent;border-radius:2px;transition:all .12s}
.pages a:hover{border-color:var(--border);color:var(--fg);text-decoration:none}
.pages .cur{color:var(--orange);border-color:var(--orange);font-weight:600}
.pages .dim{color:#222}
.pages .nav{color:var(--muted);text-transform:uppercase;font-size:.65rem;letter-spacing:.08em}
.pages .nav:hover{color:var(--fg)}
.pages .nav.disable{color:#222;pointer-events:none}

/* ── Posts ── */
.posts{}
.post{display:none;padding:.75rem 0;border-bottom:1px solid var(--border)}
.post.vis{display:block}
.post:first-child{padding-top:0}
.post-head{display:flex;align-items:baseline;gap:.6rem;margin-bottom:.45rem;font-size:.72rem;font-family:var(--mono);color:var(--muted)}
.post-head .who{color:var(--orange);font-weight:600;font-size:.75rem;text-transform:uppercase;letter-spacing:.04em}
.post-head .num{color:#333}
.post-head .at{color:#333;margin-left:auto;white-space:nowrap}
.post-body{font-size:.85rem;line-height:1.65;color:var(--fg)}
.post-body p{margin-bottom:.55rem}
.post-body p:last-child{margin-bottom:0}
.post-body code{font-family:var(--mono);font-size:.78rem;background:var(--card);padding:.08em .35em;border-radius:2px;color:#ccc}
.post-body pre{font-family:var(--mono);font-size:.75rem;background:var(--card);border:1px solid var(--border);padding:.65rem;margin:.45rem 0;overflow-x:auto;line-height:1.45;color:#bbb}
.post-body pre code{background:none;padding:0;border-radius:0}
.post-body blockquote{border-left:2px solid #222;padding-left:.85rem;margin:.45rem 0;color:var(--muted)}
.post-body blockquote p:last-child{margin-bottom:0}
.post-body img{max-width:100%;max-height:500px;object-fit:contain;margin:.45rem 0;border:1px solid var(--border);border-radius:2px}
.post-body ol,.post-body ul{padding-left:1.2rem;margin:.35rem 0}
.post-body li{margin-bottom:.2rem}
.post-body a{color:var(--orange);text-decoration:underline 1px dotted transparent;text-underline-offset:2px}
.post-body a:hover{text-decoration-color:var(--orange)}
.post-body h1,.post-body h2,.post-body h3,.post-body h4{font-weight:600;margin:.75rem 0 .35rem;color:var(--fg)}
.post-body table{width:100%;border-collapse:collapse;margin:.45rem 0;font-size:.78rem}
.post-body td,.post-body th{border:1px solid var(--border);padding:.35rem .5rem;text-align:left}
.post-body th{background:var(--card);color:var(--muted);font-weight:600;font-family:var(--mono);font-size:.7rem;text-transform:uppercase;letter-spacing:.06em}
.post-body hr{border:none;border-top:1px solid var(--border);margin:.75rem 0}
.post-body .mention{color:var(--orange)}
.post-body .emoji{display:inline;vertical-align:middle;width:1.1em;height:1.1em;margin:0 .1em}

/* ── Loading ── */
.loading{text-align:center;padding:3rem 0;color:#333;font-family:var(--mono);font-size:.75rem}
.loading span{animation:pulse 1.2s ease-in-out infinite}
.loading span:nth-child(2){animation-delay:.2s}
.loading span:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}

/* ── Footer ── */
.footer{margin-top:2.5rem;padding-top:1rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:.65rem;color:#333;font-family:var(--mono)}
.footer a{color:#444;text-decoration:underline 1px dotted transparent;text-underline-offset:2px}
.footer a:hover{color:var(--fg);text-decoration-color:var(--muted)}

/* ── Post expand ── */
.post-body{overflow:hidden}
.post-body img{transition:opacity .2s}
.post-badge{display:inline-block;font-size:.6rem;font-family:var(--mono);color:#333;background:var(--card);padding:.1rem .35rem;border-radius:2px;margin-left:.3rem}

/* ── Empty state ── */
.empty{text-align:center;padding:2rem 0;color:#333;font-family:var(--mono);font-size:.75rem}

/* ── Mobile tweaks ── */
@media(max-width:480px){
  .stat{min-width:calc(33.33% - 0px)}
  .post-head{flex-wrap:wrap;gap:.3rem}
  .post-head .at{margin-left:0;width:100%;font-size:.65rem}
  .container{padding:1rem .75rem 3rem}
}
</style>
</head>
<body>

<div class="container" id="app">
  <div class="header">
    <h1><em>■ TE SP-1</em> · Lines Archive</h1>
    <div class="sub">
      permanent archive of the <a href="https://llllllll.co/t/te-stem-player/66795" target="_blank">llllllll.co stem player thread</a>
    </div>
    <div class="tag"><span>846</span> posts · <span>179</span> participants · scraped may 2026</div>
  </div>

  <div class="stats" id="stats">
    <div class="stat"><div class="num" id="sPosts">—</div><div class="lbl">Posts</div></div>
    <div class="stat"><div class="num" id="sParts">—</div><div class="lbl">Participants</div></div>
    <div class="stat"><div class="num" id="sFiles">—</div><div class="lbl">Attachments</div></div>
    <div class="stat"><div class="num" id="sViews">—</div><div class="lbl">Views</div></div>
    <div class="stat"><div class="num" id="sLikes">—</div><div class="lbl">Likes</div></div>
    <div class="stat"><div class="num" id="sRange">—</div><div class="lbl">Duration</div></div>
  </div>

  <div class="search-wrap">
    <input id="search" type="text" placeholder="[ search by author or content ]" autocomplete="off">
  </div>

  <div class="pages" id="pagesTop"></div>

  <div class="posts" id="posts"></div>

  <div class="pages" id="pagesBot"></div>

  <div class="footer">
    <span>● <a href="https://github.com/dot-Justin/TE-SP-1-lines-thread-archive" target="_blank">github</a></span>
    <span>sp-1.dotjust.in</span>
  </div>
</div>

<script>
const PER_PAGE = 50;
let allPosts = [];
let filtered = [];

function fmtDate(iso){
  const d=new Date(iso);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

function escape(s){
  const d=document.createElement('div');
  d.textContent=s;
  return d.innerHTML;
}

function renderCooked(html){
  if(!html) return '';
  // Discourse mentions
  let h=html
    .replace(/<a class="mention"[^>]*>@(\w+)<\/a>/g,'<span class="mention">@$1</span>')
    .replace(/<a[^>]+class="mention"[^>]*>@([^<]+)<\/a>/g,'<span class="mention">@$1</span>')
    // Discourse emoji shortcodes
    .replace(/<img[^>]+src="[^"]*(emoji|emoji_one)[^"]*"[^>]*alt="([^"]*)"[^>]*>/g,':$2:')
    // Images (discourse upload:// or full URLs)
    .replace(/<img[^>]+src="([^"]+)"[^>]*alt="([^"]*)"[^>]*>/g,'<img src="$1" alt="$2" loading="lazy">')
    .replace(/<img[^>]+src="([^"]+)"[^>]*>/g,'<img src="$1" loading="lazy">')
    // Discourse lightbox
    .replace(/<a[^>]+class="lightbox"[^>]*>.*?<\/a>/g,'')
    // Open links in new tab
    .replace(/<a /g,'<a target="_blank" rel="noopener" ');
  return h;
}

function renderPosts(page){
  const start=(page-1)*PER_PAGE;
  const end=Math.min(start+PER_PAGE,filtered.length);
  const pagePosts=filtered.slice(start,end);
  const tp=Math.ceil(filtered.length/PER_PAGE);
  const el=document.getElementById('posts');
  if(!filtered.length){
    el.innerHTML='<div class="empty">∅ no matching posts</div>';
    renderPages(1,1);
    return;
  }
  el.innerHTML=pagePosts.map(p=>`
    <div class="post vis">
      <div class="post-head">
        <span class="who">${escape(p.author)}</span>
        <span class="num">#${p.num}</span>
        ${p.reply_to?`<span class="num">↳ #${p.reply_to}</span>`:''}
        <span class="at">${fmtDate(p.date)}</span>
      </div>
      <div class="post-body">${renderCooked(p.cooked)}</div>
    </div>
  `).join('');
  renderPages(page,tp);
}

function renderPages(page,tp){
  const html=()=>{
    let h='';
    h+=page>1?`<a class="nav" href="#" data-page="${page-1}">← prev</a>`:'<span class="nav disable">← prev</span>';
    let pgs=[];
    if(tp<=9){
      for(let i=1;i<=tp;i++)pgs.push(i);
    }else{
      pgs.push(1);
      if(page>4)pgs.push('…');
      for(let i=Math.max(2,page-2);i<=Math.min(tp-1,page+2);i++)pgs.push(i);
      if(page<tp-3)pgs.push('…');
      pgs.push(tp);
    }
    pgs.forEach(p=>{
      if(p==='…')h+=`<span class="dim">…</span>`;
      else if(p===page)h+=`<span class="cur">${p}</span>`;
      else h+=`<a href="#" data-page="${p}">${p}</a>`;
    });
    h+=page<tp?`<a class="nav" href="#" data-page="${page+1}">next →</a>`:'<span class="nav disable">next →</span>';
    return h;
  };
  const h=html();
  document.getElementById('pagesTop').innerHTML=h;
  document.getElementById('pagesBot').innerHTML=h;
  document.querySelectorAll('.pages a[data-page]').forEach(el=>{
    el.onclick=e=>{
      e.preventDefault();
      renderPosts(parseInt(el.dataset.page));
      window.scrollTo({top:0,behavior:'smooth'});
    };
  });
}

function search(e){
  const q=document.getElementById('search').value.toLowerCase().trim();
  if(!q){
    filtered=[...allPosts];
  }else{
    filtered=allPosts.filter(p=>{
      const text=(p.author+' '+p.cooked).toLowerCase();
      return text.includes(q);
    });
  }
  renderPosts(1);
}

async function init(){
  // Load stats
  try{
    const sr=await fetch('metadata/stats.json');
    const s=await sr.json();
    document.getElementById('sPosts').textContent=846;
    document.getElementById('sParts').textContent=s.total_participants||'—';
    document.getElementById('sFiles').textContent=s.total_uploads||'—';
    document.getElementById('sViews').textContent=(s.total_views||0).toLocaleString();
    document.getElementById('sLikes').textContent=s.total_likes||'—';
    if(s.first_post_at&&s.last_post_at){
      document.getElementById('sRange').textContent=new Date(s.first_post_at).getFullYear()+'–'+new Date(s.last_post_at).getFullYear();
    }
  }catch(e){}
  // Load posts
  try{
    const postsContainer=document.getElementById('posts');
    postsContainer.innerHTML='<div class="loading"><span>■</span><span> ■</span><span> ■</span></div>';
    const r=await fetch('data/posts.json');
    const d=await r.json();
    allPosts=d.posts||d;
    filtered=[...allPosts];
    renderPosts(1);
  }catch(e){
    document.getElementById('posts').innerHTML='<div class="empty">■ failed to load archive</div>';
    console.error(e);
  }
  // Search
  let searchTimer;
  document.getElementById('search').addEventListener('input',()=>{
    clearTimeout(searchTimer);
    searchTimer=setTimeout(search,200);
  });
}

init();
</script>
</body>
</html>
